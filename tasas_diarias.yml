name: Actualizar tasas y alertas de pago

on:
  schedule:
    # 12:00 UTC = 8:00 AM hora de Venezuela (UTC-4). Ajusta si quieres otra hora.
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de tasas y alertas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_y_tasas.py
